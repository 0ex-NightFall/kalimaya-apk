services:
  postgres:
    image: postgres:16-alpine
    container_name: kalimaya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kalimaya
      POSTGRES_PASSWORD: kalimaya
      POSTGRES_DB: kalimaya
    ports:
      - "5433:5432"
    volumes:
      - kalimaya_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kalimaya-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  kalimaya_pg:
