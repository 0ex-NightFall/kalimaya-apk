name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Inject API base URL
        working-directory: mobile
        run: |
          mkdir -p lib
          echo "const String kApiBaseUrl = 'http://192.168.1.1:5000';" > lib/config.dart
          cat lib/config.dart

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Flutter analyze (non-blocking)
        working-directory: mobile
        run: flutter analyze || true

      - name: Build APK (debug — no signing needed)
        working-directory: mobile
        run: flutter build apk --debug

      - name: List output
        working-directory: mobile
        run: ls -la build/app/outputs/flutter-apk/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kalimaya-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
